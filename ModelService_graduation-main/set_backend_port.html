<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置后端端口</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
    .success { color: green; }
    .error { color: red; }
    button { padding: 10px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>后端端口配置工具</h1>
  <p>当前检测到的后端端口: <strong>12345</strong></p>
  <button id="setPort">设置此端口到localStorage</button>
  <p id="status"></p>
  
  <script>
    document.getElementById('setPort').addEventListener('click', function() {
      try {
        localStorage.setItem('backendPort', '12345');
        document.getElementById('status').innerHTML = 
          '<span class="success">✅ 成功设置端口! 现在可以关闭此页面并刷新应用。</span>';
      } catch (e) {
        document.getElementById('status').innerHTML = 
          '<span class="error">❌ 设置失败: ' + e.message + '</span>';
      }
    });
  </script>
</body>
</html>
