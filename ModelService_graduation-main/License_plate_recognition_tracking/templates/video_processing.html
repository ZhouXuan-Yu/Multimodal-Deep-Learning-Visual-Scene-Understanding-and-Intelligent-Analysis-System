<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="{{ url_for('static', filename='IcoWebsite.ico') }}">
    <title>Video Processing</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4><i class="fas fa-video"></i> Video Processing</h4>
                    </div>
                    <div class="card-body">
                        {% if error %}
                        <div class="alert alert-danger" role="alert">{{ error }}</div>
                        {% endif %}
                        <form id="video-form" method="post" enctype="multipart/form-data">
                            <div class="form-group">
                                <label for="video-file"><i class="fas fa-file-video"></i> Video File:</label>
                                <div class="custom-file">
                                    <input type="file" class="custom-file-input" id="video-file" name="video_file" accept="video/*" required>
                                    <label class="custom-file-label" for="video-file">Choose video file</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-file-code"></i> JSON Configuration:</label>
                                <div class="input-group">
                                    <div class="custom-file">
                                        <input type="file" class="custom-file-input" id="json-file" name="json_file" accept=".json">
                                        <label class="custom-file-label" for="json-file">Choose JSON file</label>
                                    </div>
                                    <div class="input-group-append">
                                        <span class="input-group-text">or</span>
                                    </div>
                                    <input type="text" class="form-control" id="json-path" placeholder="Enter JSON file path">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="model-weights"><i class="fas fa-brain"></i> Model Weights:</label>
                                <input type="text" class="form-control" id="model-weights" name="model_weights" value="yolov8x.pt" required>
                            </div>
                            <div class="form-group">
                                <label for="device"><i class="fas fa-microchip"></i> Device:</label>
                                <select class="form-control" id="device" name="device" required>
                                    <option value="cpu">CPU</option>
                                    <option value="cuda">GPU</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="confidence-threshold"><i class="fas fa-percentage"></i> Confidence Threshold:</label>
                                <input type="number" class="form-control" id="confidence-threshold" name="confidence_threshold" value="0.3" min="0" max="1" step="0.1" required>
                            </div>
                            <div class="form-group">
                                <label for="iou-threshold"><i class="fas fa-vector-square"></i> IoU Threshold:</label>
                                <input type="number" class="form-control" id="iou-threshold" name="iou_threshold" value="0.7" min="0" max="1" step="0.1" required>
                            </div>
                            <div class="form-group">
                                <label for="classes-to-track"><i class="fas fa-list-ol"></i> Classes to Track (comma-separated):</label>
                                <input type="text" class="form-control" id="classes-to-track" name="classes_to_track" value="2, 5, 6, 7" required>
                            </div>
                            <div class="form-group">
                                <label for="receiver-email"><i class="fas fa-envelope"></i> Receiver Email:</label>
                                <input type="email" class="form-control" id="receiver-email" name="receiver_email" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-play"></i> Process Video</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
