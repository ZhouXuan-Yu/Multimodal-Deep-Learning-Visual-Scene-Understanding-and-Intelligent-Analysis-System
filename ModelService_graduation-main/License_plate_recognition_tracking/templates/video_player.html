<!DOCTYPE html>
<html>
<head>
    <title>Video Result</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="icon" href="{{ url_for('static', filename='IcoWebsite.ico') }}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            background-image: url('{{ background_image_url }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .container {
            /* background-color: rgba(255, 255, 255, 0.8); */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }
        .video-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .container h3 {
            text-align: center;
            margin: auto;
        }
        .info-container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h3>处理后的视频</h3>
                <div class="video-container">
                    <!-- 视频接口，需要提供视频源 -->
                    <img id="processed-video" src="{{ url_for('video_feed') }}?processed_video_path={{ processed_video_path }}" alt="Processed Video">
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="info-container">
                    <h3>电子邮件详情</h3>
                    <p><strong>发送指定邮件到:</strong> {{ receiver_email }}</p>
                    <p><strong>邮件内容:</strong></p>
                    <p>主题：发现车辆非法占用车道</p>
                    <p>内容：经过检测,发现<strong>{{ video_name }}</strong>视频中的车道发现有非法占用违规车辆</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
