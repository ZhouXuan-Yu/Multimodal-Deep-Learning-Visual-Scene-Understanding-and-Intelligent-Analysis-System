<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>交通分析页面</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='IcoWebsite.ico') }}">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-y: auto; /* 允许垂直滚动 */
        }
        body {
            background-image: url('/static/111.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin-bottom: 20px;
            font: 4rem 'kaiti', sans-serif;
        }
        .header form {
            display: flex;
            align-items: center;
        }
        .header form input[type="file"] {
            margin-right: 10px;
            font: 1rem 'kaiti', sans-serif;
        }
        .content {
            position: relative;
            z-index: 1;
            padding-bottom: 50px; /* 为底部按钮留出空间 */
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
            padding: 20px;
        }
        .grid-container h2 {
            margin-bottom: 10px;
            font: 1.5rem 'kaiti', sans-serif;
        }
        .grid-item {
            border: 1px solid #ccc;
            padding: 20px;
            /*background-color: rgba(255, 255, 255, 0.8);*/
            border-radius: 5px;
            /* box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); */ 
        }
        label {
            font-size: 20px;
            font: 1rem 'Kaiti', sans-serif;
        }
        #videoFrame {
            max-width: 100%;
            max-height: calc(100vh - 250px); /* 限制图像高度，留出空间给其他元素 */
            object-fit: contain; /* 保持图像纵横比 */
        }
        #finishButton {
            font-size: 20px;
            padding: 10px 20px;
            background-color: #1f241f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        #finishButton:hover {
            background-color: #303530;
        }
        #jsonOutput {
            font-size: 18px;
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
   <div class="content">
        <div class="header">
        <h1>交通分析页面</h1>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="file" name="video" accept="video/*"  required >
                <input type="submit" value="进行上传">
            </form>
            <button id="finishButton">Finish</button>
        </div>
       <div id="loadingIndicator" style="display: none;">Loading...</div>
       <div class="grid-container">
           <div class="grid-item">
               <h2>原图区</h2>
               <img id="videoFrame" src="" alt="">
           </div>
           <div class="grid-item">
               <h2>绘图区</h2>
               <canvas id="canvas"></canvas>
               <div>
                   <label for="lineThickness" >滑动选择线条粗度:</label>
                   <input type="range" id="lineThickness" min="1" max="10" value="2">
               </div>
               <div>
                   <span id="vertexCount">Vertices: 0</span>
               </div>
           </div>
       </div>
       
       <div id="warningMessage" style="display: none; color: red;">Warning: Please draw a closed polygon with at least 4 sides.</div>
       <pre id="jsonOutput"></pre>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let polygons = [];
        let currentPolygon = [];
        let lastPoint = null;
        let lineThickness = 2;
        let isPolygonComplete = false;
        let isPolygonClosed = false;

        document.getElementById('uploadForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            document.getElementById('loadingIndicator').style.display = 'block';
            fetch('/process_video', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.error) {
                    alert(data.error);
                } else {
                    const videoFrame = document.getElementById('videoFrame');
                    videoFrame.src = data.image_path;
                    videoFrame.onload = () => {
                        canvas.width = videoFrame.width;
                        canvas.height = videoFrame.height;
                        ctx.drawImage(videoFrame, 0, 0, canvas.width, canvas.height);
                    };
                }
            })
            .catch(error => {
                console.error('Error:', error);
            })
            .finally(() => {
                document.getElementById('loadingIndicator').style.display = 'none';
            });
        });

        canvas.addEventListener('mousedown', (event) => {
            if (!isPolygonComplete && !isPolygonClosed) {
                isDrawing = true;
                const point = [event.clientX - canvas.getBoundingClientRect().left, event.clientY - canvas.getBoundingClientRect().top];
                if (currentPolygon.length === 0) {
                    currentPolygon.push(point);
                    lastPoint = point;
                } else if (currentPolygon.length >= 1) {
                    drawLine(lastPoint, point);
                    currentPolygon.push(point);
                    lastPoint = point;
                }
                updateVertexCount();
            } else if (isPolygonClosed) {
                isPolygonClosed = false;
                currentPolygon = [];
                const point = [event.clientX - canvas.getBoundingClientRect().left, event.clientY - canvas.getBoundingClientRect().top];
                currentPolygon.push(point);
                lastPoint = point;
                updateVertexCount();
            }
        });

        canvas.addEventListener('mouseup', (event) => {
        if (isDrawing) {
            isDrawing = false;
            if (currentPolygon.length >= 2) {
                const point = [event.clientX - canvas.getBoundingClientRect().left, event.clientY - canvas.getBoundingClientRect().top];
                const tolerance = 5; // 可以根据需要调整这个值
                if (Math.abs(point[0] - currentPolygon[0][0]) < tolerance && Math.abs(point[1] - currentPolygon[0][1]) < tolerance) {
                    isPolygonClosed = true;
                    drawLine(lastPoint, point);
                    polygons.push(currentPolygon);
                    console.log('Polygon added:', currentPolygon);
                    console.log('All polygons:', polygons);
                    currentPolygon = [];
                    const isValid = polygons[polygons.length - 1].length >= 4;
                    const warningMessage = document.getElementById('warningMessage');
                    warningMessage.style.display = isValid ? 'none' : 'block';
                    document.getElementById('finishButton').disabled = !isValid;
                } else {
                    console.log('Polygon not closed yet:', currentPolygon);
                    drawLine(lastPoint, point);
                    currentPolygon.push(point);
                    lastPoint = point;
                }
                updateVertexCount();
            }
        }
    });

        document.getElementById('finishButton').addEventListener('click', () => {
            isPolygonComplete = true;

            // 获取绘制好的图像数据
            const imageData = canvas.toDataURL('image/png');
            console.log('Polygons before sending:', polygons);
            // 发送图像数据和多边形数据到后端
            fetch('/save_data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    image_data: imageData,
                    polygons: polygons
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Response from server:', data); 
                if (data.status === 'success') {
                    // 在前端显示保存的图像路径和JSON文件路径
                    document.getElementById('jsonOutput').textContent = `Image saved to: ${data.image_path},\nJSON saved to: ${data.json_path}`;
                    
                    // 清空 polygons 数组,准备下一次绘制
                    polygons = [];
                    currentPolygon = [];
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(videoFrame, 0, 0, canvas.width, canvas.height);
                    updateVertexCount();
                } else {
                    console.error('Error:', data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });

        function decompressResponse(response, compressedData) {
            const uncompressedData = response.headers.get('Content-Encoding') === 'gzip'
                ? decompressGzip(compressedData)
                : decompressBrotli(compressedData);
            return uncompressedData.then(buffer => new TextDecoder().decode(buffer));
        }

        function decompressGzip(compressedData) {
            return new Promise((resolve, reject) => {
                try {
                    const decompressedData = new Uint8Array(pako.ungzip(compressedData));
                    resolve(decompressedData);
                } catch (error) {
                    reject(error);
                }
            });
        }

        function decompressBrotli(compressedData) {
            return new Promise((resolve, reject) => {
                try {
                    // const decompressedData = BrotliDecode(compressedData);
                    resolve(decompressedData);
                } catch (error) {
                    reject(error);
                }
            });
        }

        function drawLine(startPoint, endPoint) {
            ctx.beginPath();
            ctx.moveTo(startPoint[0], startPoint[1]);
            ctx.lineTo(endPoint[0], endPoint[1]);
            ctx.lineWidth = lineThickness;
            ctx.stroke();
        }

        function updateVertexCount() {
            const vertexCount = document.getElementById('vertexCount');
            vertexCount.textContent = `Vertices: ${currentPolygon.length}`;
        }

        const lineThicknessInput = document.getElementById('lineThickness');
        lineThicknessInput.addEventListener('input', () => {
            lineThickness = parseInt(lineThicknessInput.value);
        });
    </script>
</body>
</html>
