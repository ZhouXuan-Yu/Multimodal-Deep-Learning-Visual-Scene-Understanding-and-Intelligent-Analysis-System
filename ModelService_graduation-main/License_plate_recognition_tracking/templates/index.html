<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车牌识别系统</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap">
    <link rel="icon" href="{{ url_for('static', filename='IcoWebsite.ico') }}">
    <style>
        :root {
            --gradient-angle: 0deg;
        }
        body {
            margin: 0;
            background-color: #f7f7f7;
            font-family: 'Roboto', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(var(--gradient-angle), #9bc0e5, #484c4e);
            color: #fff;
        }

        h1 {
            margin-bottom: 50px;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        a.button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            background-color: #0a1917;
            transition: all 0.3s ease-in-out;
            margin: 10px;
        }

        a.button:hover {
            background-color: #475fc8;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            animation: rotation 10s infinite linear;
        }

        .container h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font: 4rem 'kaiti', sans-serif;
        }
        .container button {
            margin: 20px 10px 0;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font: 2rem 'kaiti', sans-serif;
        }

        @keyframes rotation {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(359deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        <h1>车牌识别系统</h1>
        <a class="button" href="/image_upload">图片上传与识别</a>
        <a class="button" href="/video_upload">视频上传与识别</a>
        <a class="button" href="/live_camera">实时摄像头识别</a>
        <a class="button" href="/index1">救援车道占用识别与报警</a>
        <a class="button" href="/plate_workflow/workflow" style="background-color: #e74c3c;">车牌监控工作流</a>
    </div>
    <script>
        document.addEventListener('mousemove', (event) => {
            const x = event.clientX / window.innerWidth;
            const y = event.clientY / window.innerHeight;
            const angle = (x * 360) + (y * 360);
            document.documentElement.style.setProperty('--gradient-angle', `${angle}deg`);
        });
    </script>
</body>
</html>
