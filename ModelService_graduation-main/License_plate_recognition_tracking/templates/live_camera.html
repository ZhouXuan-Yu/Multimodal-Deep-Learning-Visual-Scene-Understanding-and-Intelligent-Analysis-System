<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>实时摄像头 - 车牌识别系统</title>
    <link rel="icon" href="{{ url_for('static', filename='IcoWebsite.ico') }}">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex; /* 添加此行以启用 Flexbox 布局 */
            flex-direction: column; /* 设置为列布局，以使元素垂直堆叠 */
            justify-content: center; /* 垂直居中 */
            align-items: center;
            width: 800px; /* 新增：设定宽度 */
            height: 500px; 
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }
        #videoFeed {
            border: 2px solid #fff;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            width: 246px;
            height: 183px;
        }
        button { 
            margin: 20px 10px 0;
            padding: 10px 20px; 
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        body, html {
        height: 100%;
        margin: 0;
        overflow: hidden;
    }
    .bg {
        position: fixed;
        top: 0;
        left: 0;
        min-width: 100%;
        min-height: 100%;
        z-index: -1;
    }
    .my-button {
    margin-bottom: 40px;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>实时摄像头 - 车牌识别系统</h1>
        <div>
            <button id="startCamera" class="btn">启动摄像头</button>
            <button id="stopCamera" class="btn">关闭摄像头</button>
        </div>
        <div id="videoContainer">
            <img id="videoFeed" src="{{ url_for('live_video_feed') }}" width="640" height="480">
            <p>视频流由服务器实时处理中...</p>
        </div>
    </div>



    <video autoplay loop muted class="bg">
        <source src="{{ url_for('static', filename='video.mp4') }}" type="video/mp4">
    </video>

    <script>
        const startCameraBtn = document.getElementById('startCamera');
        const stopCameraBtn = document.getElementById('stopCamera');
        const videoContainer = document.getElementById('videoContainer');
        const videoFeed = document.getElementById('videoFeed');
        
        // 页面加载时默认隐藏视频流
        document.addEventListener('DOMContentLoaded', function() {
            videoContainer.style.display = 'none';
            console.log('页面已加载，点击启动摄像头按钮开始识别');
        });
        
        // 启动摄像头按钮事件
        startCameraBtn.onclick = function() {
            videoContainer.style.display = 'block';
            // 强制重新加载图像源，确保流开始
            videoFeed.src = "{{ url_for('live_video_feed') }}?" + new Date().getTime();
            console.log('已启动摄像头视频流');
        };
        
        // 关闭摄像头按钮事件
        stopCameraBtn.onclick = function() {
            videoContainer.style.display = 'none';
            // 将图像源设置为空白图片以停止请求
            videoFeed.src = "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
            console.log('已关闭摄像头视频流');
        };
    </script>
</body>
</html>
