<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - RGBT视频处理</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .error-container {
            max-width: 600px;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .error-icon {
            font-size: 60px;
            color: #e53935;
            margin-bottom: 20px;
        }
        h1 {
            color: #e53935;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .error-message {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .error-detail {
            background-color: #f8f8f8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            text-align: left;
            color: #666;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .back-button {
            display: inline-block;
            background-color: #1e88e5;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">❌</div>
        <h1>发生错误</h1>
        <div class="error-message">{{ error_message }}</div>
        
        {% if error_detail %}
        <div class="error-detail">{{ error_detail }}</div>
        {% endif %}
        
        <a href="/api/rgbt-video" class="back-button">返回主页</a>
    </div>
</body>
</html>
