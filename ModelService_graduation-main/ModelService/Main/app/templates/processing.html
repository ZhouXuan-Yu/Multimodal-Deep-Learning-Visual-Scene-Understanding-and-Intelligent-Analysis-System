<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>处理中 - RGBT视频处理</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .processing-container {
            max-width: 600px;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .processing-icon {
            font-size: 60px;
            color: #1e88e5;
            margin-bottom: 20px;
            animation: rotate 2s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        h1 {
            color: #1e88e5;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .processing-message {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .progress-container {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: #1e88e5;
            width: {{ progress }}%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .progress-text {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        .task-info {
            background-color: #f8f8f8;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
        }
        .info-item {
            margin-bottom: 10px;
        }
        .info-label {
            font-weight: bold;
            margin-right: 10px;
        }
        .refresh-button {
            display: inline-block;
            background-color: #1e88e5;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        .refresh-button:hover {
            background-color: #1976d2;
        }
        .auto-refresh {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .countdown {
            font-weight: bold;
            color: #1e88e5;
        }
    </style>
</head>
<body>
    <div class="processing-container">
        <div class="processing-icon">⚙️</div>
        <h1>视频处理中</h1>
        <div class="processing-message">您的视频正在进行RGBT目标检测处理，请耐心等待</div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="progress-text">已完成: {{ progress }}%</div>
        
        <div class="task-info">
            <div class="info-item">
                <span class="info-label">任务ID:</span>
                <span>{{ task_id }}</span>
            </div>
            <div class="info-item">
                <span class="info-label">状态:</span>
                <span>{{ status }}</span>
            </div>
        </div>
        
        <a href="/api/rgbt-video/view/{{ task_id }}" class="refresh-button">刷新状态</a>
        
        <div class="auto-refresh">
            页面将在 <span class="countdown" id="countdownTimer">10</span> 秒后自动刷新
        </div>
    </div>
    
    <script>
        // 设置进度条
        document.querySelector(".progress-bar").style.width = "{{ progress }}%";
        
        // 自动刷新倒计时
        let countdown = 10;
        const countdownElement = document.getElementById("countdownTimer");
        
        function updateCountdown() {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                window.location.reload();
            } else {
                setTimeout(updateCountdown, 1000);
            }
        }
        
        // 启动倒计时
        setTimeout(updateCountdown, 1000);
    </script>
</body>
</html>
